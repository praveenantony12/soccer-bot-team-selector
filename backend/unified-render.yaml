services:
  # Frontend + Backend Service
  - type: web
    name: soccer-bot-team-selector
    runtime: node
    plan: free
    env: node
    rootDir: backend
    buildCommand: "cd .. && npm install && npm run build:prod && cd backend && npm install && npm run build"
    startCommand: "npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TZ
        value: America/New_York
      - key: TEAM_TIMEZONE
        value: America/New_York
      - key: MIN_PLAYERS_TO_FORM_TEAMS
        value: 12
      - key: ENABLE_MANUAL_GENERATE
        value: false
